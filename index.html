<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tom Lizard Soundboard</title>
    <style>
        body { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; font-family: 'Arial', sans-serif;
            background-color: #40fd6c; background-image: url('background.png'); 
            background-size: cover; background-position: center top;
        }
        .button-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }

        .soundBtn {
            background-color: #f1e5d1; color: #333; 
            padding: 15px 30px; /* Adjusted padding for image-button */
            border: none; border-radius: 15px; cursor: pointer; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.1s;
            display: flex; align-items: center; justify-content: center;
        }
        .soundBtn:active { transform: scale(0.95); }
        
        /* New CSS for the Image Icon */
        .btn-icon {
            width: 50px; /* Adjust size of lizard image */
            height: auto;
            display: block;
            pointer-events: none; /* Ensures click registers on button */
        }

        #status { 
            color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); 
            margin-top: 30px; font-weight: bold;
        }

        @media (max-width: 600px) {
            .button-container { flex-direction: column; width: 80%; }
            .soundBtn { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="button-container">
        <button class="soundBtn" data-sound="lizard-scream.mp3">AYAYAYAYAYYAYAYAYA</button>
        
        <button class="soundBtn" data-sound="lizard-button-sound.mp3">
            <img src="lizard-emoji.png" alt="Lizard Chat" class="btn-icon">
        </button>
    </div>

    <p id="status">Ready for release...</p>

    <script>
        const buttons = document.querySelectorAll('.soundBtn');
        const status = document.getElementById('status');

        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const audio = new Audio(btn.getAttribute('data-sound'));
                audio.play();
                status.innerText = "HELL WEEK IS OVER!!! ✌️🐧";
            });
        });
    </script>
</body>
</html>
